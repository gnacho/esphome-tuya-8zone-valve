esphome:
  name: irrigador-8z
  friendly_name: Irrigador 8Z
  
  on_boot:
    priority: 800
    then:
      - delay: 500ms
      - switch.turn_off: zona_1
      - switch.turn_off: zona_2
      - switch.turn_off: zona_3
      - switch.turn_off: zona_4
      - switch.turn_off: zona_5
      - switch.turn_off: zona_6
      - switch.turn_off: zona_7
      - switch.turn_off: zona_8

bk72xx:
  board: cbu

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Irrigador-8Z Fallback"
    password: "12345678"

captive_portal:
web_server:
  port: 80

sn74hc595:
  - id: shift_reg_hub
    data_pin: P6
    clock_pin: P15
    latch_pin: P17
    oe_pin: P8
    sr_count: 2

switch:
  - platform: gpio
    id: zona_1
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 0
      inverted: false
  
  - platform: gpio
    id: zona_2
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 1
      inverted: false
  
  - platform: gpio
    id: zona_3
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 2
      inverted: false
  
  - platform: gpio
    id: zona_4
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 3
      inverted: false
  
  - platform: gpio
    id: zona_5
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 4
      inverted: false
  
  - platform: gpio
    id: zona_6
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 5
      inverted: false
  
  - platform: gpio
    id: zona_7
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 6
      inverted: false
  
  - platform: gpio
    id: zona_8
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 7
      inverted: false

  - platform: gpio
    name: "LED Zona 1"
    id: led_1
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 8
      inverted: false
  
  - platform: gpio
    name: "LED Zona 2"
    id: led_2
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 9
      inverted: false
  
  - platform: gpio
    name: "LED Zona 3"
    id: led_3
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 10
      inverted: false
  
  - platform: gpio
    name: "LED Zona 4"
    id: led_4
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 11
      inverted: false
  
  - platform: gpio
    name: "LED Zona 5"
    id: led_5
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 12
      inverted: false
  
  - platform: gpio
    name: "LED Zona 6"
    id: led_6
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 13
      inverted: false
  
  - platform: gpio
    name: "LED Zona 7"
    id: led_7
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 14
      inverted: false
  
  - platform: gpio
    name: "LED Zona 8"
    id: led_8
    restore_mode: ALWAYS_OFF
    pin:
      sn74hc595: shift_reg_hub
      number: 15
      inverted: false

sprinkler:
  - id: controlador_riego
    main_switch: "Riego Principal"
    auto_advance_switch: "Auto Avance"
    reverse_switch: "Riego Inverso"
    valve_overlap: 5s
    
    valves:
      - valve_switch: "Zona 1"
        enable_switch: "Habilitar Zona 1"
        run_duration: 300s
        valve_switch_id: zona_1
      
      - valve_switch: "Zona 2"
        enable_switch: "Habilitar Zona 2"
        run_duration: 300s
        valve_switch_id: zona_2
      
      - valve_switch: "Zona 3"
        enable_switch: "Habilitar Zona 3"
        run_duration: 300s
        valve_switch_id: zona_3
      
      - valve_switch: "Zona 4"
        enable_switch: "Habilitar Zona 4"
        run_duration: 300s
        valve_switch_id: zona_4
      
      - valve_switch: "Zona 5"
        enable_switch: "Habilitar Zona 5"
        run_duration: 300s
        valve_switch_id: zona_5
      
      - valve_switch: "Zona 6"
        enable_switch: "Habilitar Zona 6"
        run_duration: 300s
        valve_switch_id: zona_6
      
      - valve_switch: "Zona 7"
        enable_switch: "Habilitar Zona 7"
        run_duration: 300s
        valve_switch_id: zona_7
      
      - valve_switch: "Zona 8"
        enable_switch: "Habilitar Zona 8"
        run_duration: 300s
        valve_switch_id: zona_8

binary_sensor:
  - platform: gpio
    pin:
      number: P24
      mode: INPUT_PULLUP
      inverted: true
    name: "Botón SET"
    internal: true
    on_press:
      then:
        - logger.log: "Botón SET (P24) presionado"
  
  - platform: gpio
    pin:
      number: P26
      mode: INPUT_PULLUP
      inverted: true
    name: "Botón UP"
    internal: true
    on_press:
      then:
        - logger.log: "Botón UP (P26) presionado"
