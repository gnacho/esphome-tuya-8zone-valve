esphome:
  name: irrigador-8z-sep
  friendly_name: Irrigador 8Z SEP
  on_boot:
    priority: 800
    then:
      - delay: 500ms
      - output.turn_off: led_1
      - output.turn_off: led_2
      - output.turn_off: led_3
      - output.turn_off: led_4
      - output.turn_off: led_5
      - output.turn_off: led_6
      - output.turn_off: led_7
      - output.turn_off: led_8
      - switch.turn_off: valve_1
      - switch.turn_off: valve_2
      - switch.turn_off: valve_3
      - switch.turn_off: valve_4
      - switch.turn_off: valve_5
      - switch.turn_off: valve_6
      - switch.turn_off: valve_7
      - switch.turn_off: valve_8

bk72xx:
  board: cbu

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Irrigador-8Z-SEP Fallback"
    password: "12345678"

captive_portal:
web_server:
  port: 80

status_led:
  pin:
    number: P28
    inverted: false

sn74hc595:
  - id: led_sn74hc595
    data_pin: P9
    clock_pin: P15
    latch_pin: P17
  - id: valve_sn74hc595
    data_pin: P16
    clock_pin: P22
    latch_pin: P20

output:
  - platform: gpio
    id: buzzer
    pin:
      number: P14
      inverted: false
  - platform: gpio
    id: led_1
    pin:
      sn74hc595: led_sn74hc595
      number: 0
      inverted: true
  - platform: gpio
    id: led_2
    pin:
      sn74hc595: led_sn74hc595
      number: 1
      inverted: true
  - platform: gpio
    id: led_3
    pin:
      sn74hc595: led_sn74hc595
      number: 2
      inverted: true
  - platform: gpio
    id: led_4
    pin:
      sn74hc595: led_sn74hc595
      number: 3
      inverted: true
  - platform: gpio
    id: led_5
    pin:
      sn74hc595: led_sn74hc595
      number: 4
      inverted: true
  - platform: gpio
    id: led_6
    pin:
      sn74hc595: led_sn74hc595
      number: 5
      inverted: true
  - platform: gpio
    id: led_7
    pin:
      sn74hc595: led_sn74hc595
      number: 6
      inverted: true
  - platform: gpio
    id: led_8
    pin:
      sn74hc595: led_sn74hc595
      number: 7
      inverted: true

switch:
  - platform: gpio
    id: valve_1
    name: "Válvula 1"
    pin:
      sn74hc595: valve_sn74hc595
      number: 0
      inverted: false
    on_turn_on:
      then:
        - lambda: if (id(selected_zone) != 0) id(led_1)->turn_on();
    on_turn_off:
      then:
        - lambda: if (id(selected_zone) != 1) id(led_1)->turn_off();
