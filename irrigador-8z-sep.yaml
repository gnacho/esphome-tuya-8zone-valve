      - valve_switch: "Zona 5"
        enable_switch: "Habilitar Zona 5"
        run_duration_number:
          name: "Duración Zona 5"
          initial_value: 5
          unit_of_measurement: min
        valve_switch_id: valve_5
      - valve_switch: "Zona 6"
        enable_switch: "Habilitar Zona 6"
        run_duration_number:
          name: "Duración Zona 6"
          initial_value: 5
          unit_of_measurement: min
