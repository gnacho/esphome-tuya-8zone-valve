esphome:
  name: irrigador-8z-sep
  friendly_name: Irrigador 8Z SEP
  on_boot:
    priority: 800
    then:
      - delay: 500ms
      - output.turn_off: led_1
      - output.turn_off: led_2
      - output.turn_off: led_3
      - output.turn_off: led_4
      - output.turn_off: led_5
      - output.turn_off: led_6
      - output.turn_off: led_7
      - output.turn_off: led_8
      - switch.turn_off: valve_1
      - switch.turn_off: valve_2
      - switch.turn_off: valve_3
      - switch.turn_off: valve_4
      - switch.turn_off: valve_5
      - switch.turn_off: valve_6
      - switch.turn_off: valve_7
      - switch.turn_off: valve_8

bk72xx:
  board: cbu

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Irrigador-8Z-SEP Fallback"
    password: "12345678"

captive_portal:
web_server:
  port: 80

status_led:
  pin:
    number: P28
    inverted: false

sn74hc595:
  - id: led_sn74hc595
    data_pin: P9
    clock_pin: P15
    latch_pin: P17
  - id: valve_sn74hc595
    data_pin: P16
    clock_pin: P22
    latch_pin: P20

output:
  - platform: gpio
    id: buzzer
    pin:
      number: P14
      inverted: false
  - platform: gpio
    id: led_1
    pin:
      sn74hc595: led_sn74hc595
      number: 0
      inverted: true
  - platform: gpio
    id: led_2
    pin:
      sn74hc595: led_sn74hc595
      number: 1
      inverted: true
  - platform: gpio
    id: led_3
    pin:
      sn74hc595: led_sn74hc595
      number: 2
      inverted: true
  - platform: gpio
    id: led_4
    pin:
      sn74hc595: led_sn74hc595
      number: 3
      inverted: true
  - platform: gpio
    id: led_5
    pin:
      sn74hc595: led_sn74hc595
      number: 4
      inverted: true
  - platform: gpio
    id: led_6
    pin:
      sn74hc595: led_sn74hc595
      number: 5
      inverted: true
  - platform: gpio
    id: led_7
    pin:
      sn74hc595: led_sn74hc595
      number: 6
      inverted: true
  - platform: gpio
    id: led_8
    pin:
      sn74hc595: led_sn74hc595
      number: 7
      inverted: true

switch:
  - platform: gpio
    id: valve_1
    name: "Válvula 1"
    pin:
      sn74hc595: valve_sn74hc595
      number: 0
      inverted: false
    on_turn_on:
      then:
        - output.turn_on: led_1
    on_turn_off:
      then:
        - output.turn_off: led_1
  - platform: gpio
    id: valve_2
    name: "Válvula 2"
    pin:
      sn74hc595: valve_sn74hc595
      number: 1
      inverted: false
    on_turn_on:
      then:
        - output.turn_on: led_2
    on_turn_off:
      then:
        - output.turn_off: led_2
  - platform: gpio
    id: valve_3
    name: "Válvula 3"
    pin:
      sn74hc595: valve_sn74hc595
      number: 2
      inverted: false
    on_turn_on:
      then:
        - output.turn_on: led_3
    on_turn_off:
      then:
        - output.turn_off: led_3
  - platform: gpio
    id: valve_4
    name: "Válvula 4"
    pin:
      sn74hc595: valve_sn74hc595
      number: 3
      inverted: false
    on_turn_on:
      then:
        - output.turn_on: led_4
    on_turn_off:
      then:
        - output.turn_off: led_4
  - platform: gpio
    id: valve_5
    name: "Válvula 5"
    pin:
      sn74hc595: valve_sn74hc595
      number: 4
      inverted: false
    on_turn_on:
      then:
        - output.turn_on: led_5
    on_turn_off:
      then:
        - output.turn_off: led_5
  - platform: gpio
    id: valve_6
    name: "Válvula 6"
    pin:
      sn74hc595: valve_sn74hc595
      number: 5
      inverted: false
    on_turn_on:
      then:
        - output.turn_on: led_6
    on_turn_off:
      then:
        - output.turn_off: led_6
  - platform: gpio
    id: valve_7
    name: "Válvula 7"
    pin:
      sn74hc595: valve_sn74hc595
      number: 6
      inverted: false
    on_turn_on:
      then:
        - output.turn_on: led_7
    on_turn_off:
      then:
        - output.turn_off: led_7
  - platform: gpio
    id: valve_8
    name: "Válvula 8"
    pin:
      sn74hc595: valve_sn74hc595
      number: 7
      inverted: false
    on_turn_on:
      then:
        - output.turn_on: led_8
    on_turn_off:
      then:
        - output.turn_off: led_8

globals:
  - id: manual_zone
    type: bool
    initial_value: "false"

script:
  - id: toggle_riego
    then:
      - lambda: |
          if (id(irrigador).active_valve().has_value()) {
            id(irrigador).shutdown();
            id(manual_zone) = false;
          } else if (id(manual_zone)) {
            auto valve = id(irrigador).active_valve();
            if (valve.has_value()) {
              for (size_t i = 0; i < 8; i++) {
                if (i == valve.value()) {
                  id(irrigador).enable_switch(i)->turn_on();
                } else {
                  id(irrigador).enable_switch(i)->turn_off();
                }
              }
            }
            id(irrigador).resume_or_start_full_cycle();
          } else {
            for (size_t i = 0; i < 8; i++) {
              id(irrigador).enable_switch(i)->turn_on();
            }
            id(irrigador).resume_or_start_full_cycle();
          }

binary_sensor:
  - platform: gpio
    pin:
      number: P7
      inverted: true
    name: "Botón UP (P7)"
    internal: true
    on_press:
      then:
        - output.turn_on: buzzer
        - delay: 100ms
        - output.turn_off: buzzer
        - lambda: id(manual_zone) = true;
        - sprinkler.next_valve: irrigador
  - platform: gpio
    pin:
      number: P6
      inverted: true
    name: "Botón DOWN (P6)"
    internal: true
    on_press:
      then:
        - output.turn_on: buzzer
        - delay: 100ms
        - output.turn_off: buzzer
        - lambda: id(manual_zone) = true;
        - sprinkler.previous_valve: irrigador
  - platform: gpio
    pin:
      number: P8
      inverted: true
    name: "Botón SET (P8)"
    internal: true
    on_press:
      then:
        - output.turn_on: buzzer
        - delay: 100ms
        - output.turn_off: buzzer
        - script.execute: toggle_riego


sprinkler:
  - id: irrigador
    main_switch: "Riego"
    auto_advance_switch: "Auto Avance"
    valve_overlap: 5s
    valves:
      - valve_switch: "Zona 1"
        enable_switch: "Habilitar Zona 1"
        run_duration_number:
          name: "Duración Zona 1"
          initial_value: 5
          unit_of_measurement: min
        valve_switch_id: valve_1
      - valve_switch: "Zona 2"
        enable_switch: "Habilitar Zona 2"
